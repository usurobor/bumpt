name: Vercel setup (one-off)

# Manual, idempotent Vercel bring-up from a runner (open egress; the dev sandbox
# has none). Links/creates the project, ensures OPS_TOKEN, deploys to production,
# then applies schema.sql via the app's OPS-guarded /api/migrate endpoint (which
# uses the app's runtime DATABASE_URL — no env-file extraction needed).
#
# Required secret:  VERCEL_TOKEN
# Optional secrets: OPS_TOKEN (generated if absent), VERCEL_SCOPE (team slug)

on:
  workflow_dispatch:
  # Temporary: lets edits to this file drive the one-off run (the dev sandbox
  # can't dispatch via API). Remove once setup is confirmed.
  # trigger: migrate with comment-stripping fix
  push:
    branches: [dev]
    paths:
      - .github/workflows/vercel-setup.yml

permissions:
  contents: read

jobs:
  vercel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiment
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SCOPE: ${{ secrets.VERCEL_SCOPE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Preflight
        run: '[ -n "$VERCEL_TOKEN" ] || { echo "::error::VERCEL_TOKEN secret is not set"; exit 1; }'

      - name: Link / create project (root = experiment)
        run: vercel link --yes --project bumpt --token "$VERCEL_TOKEN" ${SCOPE:+--scope "$SCOPE"}

      - name: Ensure OPS_TOKEN (production)
        env:
          IN_OPS_TOKEN: ${{ secrets.OPS_TOKEN }}
        run: |
          scope_args=(); [ -n "$SCOPE" ] && scope_args=(--scope "$SCOPE")
          OPS="${IN_OPS_TOKEN:-$(openssl rand -hex 24)}"
          echo "::add-mask::$OPS"
          vercel env rm OPS_TOKEN production --yes --token "$VERCEL_TOKEN" "${scope_args[@]}" >/dev/null 2>&1 || true
          printf '%s' "$OPS" | vercel env add OPS_TOKEN production --token "$VERCEL_TOKEN" "${scope_args[@]}" >/dev/null
          echo "OPS=$OPS" >> "$GITHUB_ENV"
          echo "OPS_TOKEN set on Vercel (production)"

      - name: Deploy to production
        id: deploy
        run: |
          scope_args=(); [ -n "$SCOPE" ] && scope_args=(--scope "$SCOPE")
          url="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" "${scope_args[@]}")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"

      - name: Apply schema via /api/migrate
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          # Use the public production alias (the deployment-hash URL is gated by
          # Vercel deployment protection). Settle briefly for the alias to swing.
          url="${PROD_URL:-https://bumpt-nine.vercel.app}"
          echo "POST $url/api/migrate"
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/mig.json -w '%{http_code}' -X POST \
              "$url/api/migrate?token=$OPS" \
              -H 'content-type: text/plain' --data-binary @schema.sql || echo 000)
            echo "attempt $attempt: HTTP $code"
            [ "$code" = "200" ] && break
            sleep 5
          done
          cat /tmp/mig.json 2>/dev/null; echo
          [ "$code" = "200" ] || { echo "::error::migrate failed (HTTP $code)"; exit 1; }

      - name: Summary
        run: |
          {
            echo "### Vercel setup"
            echo ""
            echo "**Production URL:** ${{ steps.deploy.outputs.url }}"
            echo "- Alias: https://bumpt-nine.vercel.app"
            echo "- Schema applied via /api/migrate ✓"
            echo "- OPS_TOKEN stored on Vercel (Settings → Environment Variables)."
          } >> "$GITHUB_STEP_SUMMARY"
