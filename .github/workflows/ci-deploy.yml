name: CI & gated deploy

# Build + test the experiment app on every push to dev. Only if the gate is green
# do we fast-forward the deploy branch (which Vercel watches) and cut a tagged
# release. The deploy branch is a pure fast-forward mirror of dev — no extra commits.

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ci-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      typecheck: ${{ steps.typecheck.outcome }}
      build: ${{ steps.build.outcome }}
      smoke: ${{ steps.smoke.outcome }}
      dbverify: ${{ steps.dbverify.outcome }}
      passed: ${{ steps.stats.outputs.passed }}
      ran: ${{ steps.stats.outputs.ran }}
      skipped: ${{ steps.stats.outputs.skipped }}
    defaults:
      run:
        working-directory: experiment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: experiment/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        id: typecheck
        run: npm run typecheck

      - name: Build
        id: build
        run: npm run build

      - name: Start Postgres + Neon HTTP proxy
        run: docker compose -f .ci/docker-compose.ci.yml up -d --wait

      - name: Apply schema
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d main -v ON_ERROR_STOP=1 -f schema.sql

      - name: Start app
        env:
          DATABASE_URL: postgres://postgres:postgres@db.localtest.me:5432/main
          NEON_LOCAL_PROXY: "1"
        run: |
          echo "127.0.0.1 db.localtest.me" | sudo tee -a /etc/hosts
          npm run start &
          echo $! > /tmp/app.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/thanks >/dev/null && exit 0
            sleep 2
          done
          echo "app did not become ready" >&2
          exit 1

      - name: Smoke test
        id: smoke
        run: npm run test:smoke

      - name: Verify database state
        id: dbverify
        env:
          PGPASSWORD: postgres
        run: |
          q() { psql -h localhost -U postgres -d main -tAc "$1" | tr -d '[:space:]'; }
          rows=$(q "select count(*) from bump_request_events")
          people=$(q "select count(distinct device_id) from bump_request_events")
          mem_a=$(q "select count(*) from bump_request_events where member_id = 'a'")
          mem_b=$(q "select count(*) from bump_request_events where member_id = 'b'")
          scans=$(q "select count(*) from scan_events")
          echo "rows=$rows people=$people mem_a=$mem_a mem_b=$mem_b scan_events=$scans"
          # One device asked member a twice (dedupe -> 1 row) and member b once (1 row).
          test "$rows" = "2" || { echo "::error::expected 2 bump_request_events, got $rows"; exit 1; }
          # Global unique people stays distinct-device-based: one device.
          test "$people" = "1" || { echo "::error::expected 1 distinct device, got $people"; exit 1; }
          # Per-member: same device + same member deduped; same device + different member counted.
          test "$mem_a" = "1" || { echo "::error::expected 1 row for member a, got $mem_a"; exit 1; }
          test "$mem_b" = "1" || { echo "::error::expected 1 row for member b, got $mem_b"; exit 1; }
          # The /m/a and /m/b scans were recorded; forged/empty POSTs recorded nothing.
          test "$scans" -ge "2" || { echo "::error::expected >=2 scan_events, got $scans"; exit 1; }

      - name: Smoke stats
        id: stats
        if: always()
        run: |
          if [[ -f smoke-stats.json ]]; then
            echo "passed=$(jq -r '.expected' smoke-stats.json)"            >> "$GITHUB_OUTPUT"
            echo "ran=$(jq -r '.expected + .unexpected' smoke-stats.json)" >> "$GITHUB_OUTPUT"
            echo "skipped=$(jq -r '.skipped' smoke-stats.json)"            >> "$GITHUB_OUTPUT"
          fi

      - name: Stop app
        if: always()
        run: kill "$(cat /tmp/app.pid)" 2>/dev/null || true

      - name: Proxy logs on failure
        if: failure()
        run: docker compose -f .ci/docker-compose.ci.yml logs --no-color || true

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward deploy to dev
        run: git push origin HEAD:deploy

      - name: Tag + release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="deploy-$(date -u +%Y%m%d.%H%M%S)"
          git tag -a "$TAG" -m "Gated deploy of ${GITHUB_SHA}"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes

      - name: Deploy to Vercel (production)
        working-directory: experiment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SCOPE: ${{ secrets.VERCEL_SCOPE }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set — skipping Vercel deploy"; exit 0; fi
          npm i -g vercel@latest >/dev/null 2>&1
          vercel link --yes --project bumpt --token "$VERCEL_TOKEN" ${SCOPE:+--scope "$SCOPE"}
          url="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" ${SCOPE:+--scope "$SCOPE"})"
          echo "Vercel production: $url"

  # Live post-deploy smoke: probes the live site after deploy. Read-only and scoped
  # to the dedicated `test` member (excluded from demand metrics) so it MUST NOT
  # increment any public count — it never POSTs /api/bump-request. It asserts the
  # site is up and the scan-origination rule renders (scanned About enables the ask;
  # direct About disables it). Skipped if deploy was skipped (gate red).
  live-smoke:
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Read-only live probe (test member, no count writes)
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          base="${PROD_URL:-https://bumpt.io}"
          echo "live-smoke: $base"
          fail=0

          # Home + privacy must be up.
          for p in / /privacy; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$base$p")
            echo "  GET $p -> $code"
            [ "$code" = "200" ] || { echo "::error::$p returned $code"; fail=1; }
          done

          # Scan the dedicated test member (excluded from demand metrics). This member
          # only exists once schema.sql has been applied to the LIVE DB via /api/migrate
          # (a post-deploy runner action — the gate cannot reach the live DB). Until then
          # /m/test is a 404, so this portion is best-effort (warns, never fails the gate).
          card=$(curl -s "$base/m/test")
          scan=$(printf '%s' "$card" | grep -oE 's=[0-9a-fA-F-]{36}' | head -n1 | cut -d= -f2)
          echo "  /m/test scan_id=${scan:-<none>}"
          if [ -n "$scan" ]; then
            # Scanned About enables the ask (form present). Read-only: we do NOT submit it.
            scanned=$(curl -s "$base/about?m=test&s=$scan")
            printf '%s' "$scanned" | grep -q 'action="/api/bump-request"' \
              || { echo "::error::scanned /about did not render the ask form"; fail=1; }
          else
            echo "::warning::/m/test not present yet — apply schema.sql to the live DB via /api/migrate"
          fi

          # Direct About disables the ask and shows the scan-first rule.
          # (Schema-independent: this is the core scan-origination guarantee.)
          direct=$(curl -s "$base/about")
          printf '%s' "$direct" | grep -q 'Scan a member first' \
            || { echo "::error::direct /about missing the scan-first rule"; fail=1; }
          printf '%s' "$direct" | grep -q 'action="/api/bump-request"' \
            && { echo "::error::direct /about exposed the ask form"; fail=1; }

          [ "$fail" = "0" ] && echo "live-smoke: ok (read-only, no public counts touched)"
          exit "$fail"

  # Prod visual gate: proves the live homepage at bumpt.io/ renders pixel-identical
  # to the design mock screens/home/view.html (on main). Mirrors the design gate in
  # design-deploy.yml. Permanent: every prod deploy re-verifies bumpt.io/ == the mock.
  # Home is static, so no DB fixture is needed. Match = diff <= 1%.
  prod-visual:
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch the mock from main
        run: |
          git fetch origin main
          git show origin/main:screens/home/view.html > home-mock.html
          echo "mock bytes: $(wc -c < home-mock.html)"

      - name: Wait for prod to be live
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          base="${PROD_URL:-https://bumpt.io}"
          echo "wait-for-live: $base/"
          for i in $(seq 1 12); do
            code=$(curl -sS -m 15 -o /dev/null -w '%{http_code}' "$base/" || echo 000)
            echo "  wait $i: $base/ -> HTTP $code"
            [ "$code" = "200" ] && break
            sleep 8
          done
          [ "$code" = "200" ] || { echo "::error::$base/ not serving (HTTP $code)"; exit 1; }

      - name: Visual check — bumpt.io/ matches the mock
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          # Install + run from the workspace dir so playwright/pixelmatch/pngjs resolve.
          npm i --no-save playwright pixelmatch pngjs
          npx playwright install --with-deps chromium
          mkdir -p diff
          cat > prodvcheck.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs'; import path from 'node:path';
          import pngjs from 'pngjs'; const { PNG } = pngjs;
          import pixelmatch from 'pixelmatch';
          const BASE = (process.env.PROD_URL || 'https://bumpt.io').replace(/\/$/, '');
          const browser = await chromium.launch();
          const shoot = async (ctx, url) => {
            const p = await ctx.newPage();
            await p.goto(url, { waitUntil: 'networkidle' });
            try { await p.evaluate(() => document.fonts.ready); } catch {}
            await p.waitForTimeout(500);
            const buf = await p.screenshot({ fullPage: true });
            await p.close(); return buf;
          };
          const ctx = await browser.newContext({ viewport:{width:390,height:844}, deviceScaleFactor:2, reducedMotion:'reduce' });
          const mock = PNG.sync.read(await shoot(ctx, 'file://' + path.resolve('home-mock.html')));
          const prod = PNG.sync.read(await shoot(ctx, BASE + '/'));
          await ctx.close();
          await browser.close();
          if (mock.width !== prod.width || mock.height !== prod.height) {
            console.error(`SIZE MISMATCH mock ${mock.width}x${mock.height} vs prod ${prod.width}x${prod.height}`);
            const w = Math.min(mock.width, prod.width), h = Math.min(mock.height, prod.height);
            const diff = new PNG({ width: w, height: h });
            // crop both to the common region for a visible diff artifact
            const crop = (img) => { const o = new PNG({ width: w, height: h });
              for (let y=0;y<h;y++) for (let x=0;x<w;x++){ const si=(img.width*y+x)<<2, di=(w*y+x)<<2;
                o.data[di]=img.data[si]; o.data[di+1]=img.data[si+1]; o.data[di+2]=img.data[si+2]; o.data[di+3]=img.data[si+3]; } return o; };
            pixelmatch(crop(mock).data, crop(prod).data, diff.data, w, h, { threshold: 0.1 });
            fs.writeFileSync('diff/home.png', PNG.sync.write(diff));
            process.exit(1);
          }
          const { width, height } = mock; const diff = new PNG({ width, height });
          const n = pixelmatch(mock.data, prod.data, diff.data, width, height, { threshold: 0.1 });
          const pct = 100 * n / (width * height); const pctR = Math.round(pct);
          fs.writeFileSync('diff/home.png', PNG.sync.write(diff));
          console.log(`home: ${pctR}% diff over ${width}x${height}`);
          if (pct > 1) { console.error(`\nprod home differs from mock by ${pctR}% (> 1% — not a match)`); process.exit(1); }
          console.log('\nvisual match ✓ — bumpt.io/ == screens/home/view.html (0% — match)');
          EOF
          node prodvcheck.mjs

      - name: Upload visual diff
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-home-diff
          path: diff/
          if-no-files-found: ignore

  # Pre-deploy notification: runs after the gate regardless of result.
  # Green is short (headline + aggregate); red is detailed (per-step breakdown).
  notify-pre:
    needs: build-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Telegram — pre-deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          GATE: ${{ needs.build-test.result }}
          O_TYPECHECK: ${{ needs.build-test.outputs.typecheck }}
          O_BUILD: ${{ needs.build-test.outputs.build }}
          O_SMOKE: ${{ needs.build-test.outputs.smoke }}
          O_DBVERIFY: ${{ needs.build-test.outputs.dbverify }}
          PASSED: ${{ needs.build-test.outputs.passed }}
          RAN: ${{ needs.build-test.outputs.ran }}
          SKIPPED: ${{ needs.build-test.outputs.skipped }}
        run: |
          icon() { case "$1" in
            success) printf '✅';; failure) printf '❌';;
            cancelled) printf '🚫';; skipped) printf '⏭';; *) printf '❓';; esac; }

          sha7="${GITHUB_SHA:0:7}"
          subject="$(git log -1 --pretty=%s)"

          # Aggregate one-liner + smoke-row count suffix, only when stats exist.
          agg=""; smoke_suffix=""
          if [[ -n "${RAN:-}" ]]; then
            agg="smoke · ${PASSED}/${RAN} checks passed"
            smoke_suffix=" (${PASSED}/${RAN}"
            if [[ "${SKIPPED:-0}" -gt 0 ]]; then
              agg="${agg} (${SKIPPED} skipped)"
              smoke_suffix="${smoke_suffix}, ${SKIPPED} skipped"
            fi
            smoke_suffix="${smoke_suffix})"
          fi

          export TG_SUBLINE="bumpt@${GITHUB_REF_NAME}:${sha7}"
          export TG_SUBJECT="$subject"
          export TG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          export TG_AGGREGATE="$agg"

          if [[ "$GATE" == "success" ]]; then
            export TG_HEADER="✅ Pre-deploy passed"
          else
            export TG_HEADER="❌ Pre-deploy failed"
            export TG_BREAKDOWN="$(printf '  %s typecheck\n  %s build\n  %s smoke%s\n  %s db-verify' \
              "$(icon "$O_TYPECHECK")" "$(icon "$O_BUILD")" "$(icon "$O_SMOKE")" "$smoke_suffix" "$(icon "$O_DBVERIFY")")"
          fi

          bash experiment/.ci/telegram-notify.sh

  # Post-deploy notification: runs after the deploy job (skipped when the gate
  # failed and deploy never ran). Notify-only today — no live-site test yet.
  notify-post:
    needs: deploy
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Telegram — post-deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          RESULT: ${{ needs.deploy.result }}
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          sha7="${GITHUB_SHA:0:7}"
          subject="$(git log -1 --pretty=%s)"
          tag="$(git tag --list 'deploy-*' --points-at HEAD | head -n1)"

          case "$RESULT" in
            success)   header="✅ Post-deploy success";;
            failure)   header="❌ Post-deploy failed";;
            cancelled) header="🚫 Post-deploy cancelled";;
            *)         header="❓ Post-deploy ${RESULT}";;
          esac

          target="${PROD_URL:-https://bumpt-nine.vercel.app}"
          subline="bumpt@${tag:-$GITHUB_REF_NAME}:${sha7}"
          [[ -n "$target" ]] && subline="${subline} → ${target}"

          export TG_HEADER="$header"
          export TG_SUBLINE="$subline"
          export TG_SUBJECT="$subject"
          export TG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          bash experiment/.ci/telegram-notify.sh
