name: CI & gated deploy

# Build + test the experiment app on every push to dev. Only if the gate is green
# do we fast-forward the deploy branch (which Vercel watches) and cut a tagged
# release. The deploy branch is a pure fast-forward mirror of dev â€” no extra commits.

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ci-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    outputs:
      typecheck: ${{ steps.typecheck.outcome }}
      build: ${{ steps.build.outcome }}
      smoke: ${{ steps.smoke.outcome }}
      dbverify: ${{ steps.dbverify.outcome }}
      passed: ${{ steps.stats.outputs.passed }}
      ran: ${{ steps.stats.outputs.ran }}
      skipped: ${{ steps.stats.outputs.skipped }}
    defaults:
      run:
        working-directory: experiment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: experiment/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        id: typecheck
        run: npm run typecheck

      - name: Build
        id: build
        run: npm run build

      - name: Start Postgres + Neon HTTP proxy
        run: docker compose -f .ci/docker-compose.ci.yml up -d --wait

      - name: Apply schema
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d main -v ON_ERROR_STOP=1 -f schema.sql

      - name: Start app
        env:
          DATABASE_URL: postgres://postgres:postgres@db.localtest.me:5432/main
          NEON_LOCAL_PROXY: "1"
        run: |
          echo "127.0.0.1 db.localtest.me" | sudo tee -a /etc/hosts
          npm run start &
          echo $! > /tmp/app.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:3000/thanks >/dev/null && exit 0
            sleep 2
          done
          echo "app did not become ready" >&2
          exit 1

      - name: Smoke test
        id: smoke
        run: npm run test:smoke

      - name: Verify database state
        id: dbverify
        env:
          PGPASSWORD: postgres
        run: |
          q() { psql -h localhost -U postgres -d main -tAc "$1" | tr -d '[:space:]'; }
          rows=$(q "select count(*) from bump_request_events")
          people=$(q "select count(distinct device_id) from bump_request_events")
          mem_a=$(q "select count(*) from bump_request_events where member_id = 'a'")
          mem_b=$(q "select count(*) from bump_request_events where member_id = 'b'")
          scans=$(q "select count(*) from scan_events")
          echo "rows=$rows people=$people mem_a=$mem_a mem_b=$mem_b scan_events=$scans"
          # One device asked member a twice (dedupe -> 1 row) and member b once (1 row).
          test "$rows" = "2" || { echo "::error::expected 2 bump_request_events, got $rows"; exit 1; }
          # Global unique people stays distinct-device-based: one device.
          test "$people" = "1" || { echo "::error::expected 1 distinct device, got $people"; exit 1; }
          # Per-member: same device + same member deduped; same device + different member counted.
          test "$mem_a" = "1" || { echo "::error::expected 1 row for member a, got $mem_a"; exit 1; }
          test "$mem_b" = "1" || { echo "::error::expected 1 row for member b, got $mem_b"; exit 1; }
          # The /m/a and /m/b scans were recorded; forged/empty POSTs recorded nothing.
          test "$scans" -ge "2" || { echo "::error::expected >=2 scan_events, got $scans"; exit 1; }

      - name: Smoke stats
        id: stats
        if: always()
        run: |
          if [[ -f smoke-stats.json ]]; then
            echo "passed=$(jq -r '.expected' smoke-stats.json)"            >> "$GITHUB_OUTPUT"
            echo "ran=$(jq -r '.expected + .unexpected' smoke-stats.json)" >> "$GITHUB_OUTPUT"
            echo "skipped=$(jq -r '.skipped' smoke-stats.json)"            >> "$GITHUB_OUTPUT"
          fi

      - name: Stop app
        if: always()
        run: kill "$(cat /tmp/app.pid)" 2>/dev/null || true

      - name: Proxy logs on failure
        if: failure()
        run: docker compose -f .ci/docker-compose.ci.yml logs --no-color || true

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward deploy to dev
        run: git push origin HEAD:deploy

      - name: Tag + release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="deploy-$(date -u +%Y%m%d.%H%M%S)"
          git tag -a "$TAG" -m "Gated deploy of ${GITHUB_SHA}"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes

      - name: Deploy to Vercel (production)
        working-directory: experiment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SCOPE: ${{ secrets.VERCEL_SCOPE }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then echo "VERCEL_TOKEN not set â€” skipping Vercel deploy"; exit 0; fi
          npm i -g vercel@latest >/dev/null 2>&1
          vercel link --yes --project bumpt --token "$VERCEL_TOKEN" ${SCOPE:+--scope "$SCOPE"}
          url="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" ${SCOPE:+--scope "$SCOPE"})"
          echo "Vercel production: $url"

  # Live post-deploy smoke: probes the live site after deploy. Read-only and scoped
  # to the dedicated `test` member (excluded from demand metrics) so it MUST NOT
  # increment any public count â€” it never POSTs /api/bump-request. It asserts the
  # site is up and the scan-origination rule renders (scanned About enables the ask;
  # direct About disables it). Skipped if deploy was skipped (gate red).
  live-smoke:
    needs: deploy
    if: ${{ always() && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Read-only live probe (test member, no count writes)
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          base="${PROD_URL:-https://bumpt.io}"
          echo "live-smoke: $base"
          fail=0

          # Home + privacy must be up.
          for p in / /privacy; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$base$p")
            echo "  GET $p -> $code"
            [ "$code" = "200" ] || { echo "::error::$p returned $code"; fail=1; }
          done

          # Scan the dedicated test member (excluded from demand metrics).
          card=$(curl -s "$base/m/test")
          # Pull the threaded scan_id out of the About link.
          scan=$(printf '%s' "$card" | grep -oE 's=[0-9a-fA-F-]{36}' | head -n1 | cut -d= -f2)
          echo "  /m/test scan_id=${scan:-<none>}"
          [ -n "$scan" ] || { echo "::error::/m/test did not render a scan link"; fail=1; }

          # Scanned About enables the ask (form present). Read-only: we do NOT submit it.
          if [ -n "$scan" ]; then
            scanned=$(curl -s "$base/about?m=test&s=$scan")
            printf '%s' "$scanned" | grep -q 'action="/api/bump-request"' \
              || { echo "::error::scanned /about did not render the ask form"; fail=1; }
          fi

          # Direct About disables the ask and shows the scan-first rule.
          direct=$(curl -s "$base/about")
          printf '%s' "$direct" | grep -q 'Scan a member first' \
            || { echo "::error::direct /about missing the scan-first rule"; fail=1; }
          printf '%s' "$direct" | grep -q 'action="/api/bump-request"' \
            && { echo "::error::direct /about exposed the ask form"; fail=1; }

          [ "$fail" = "0" ] && echo "live-smoke: ok (read-only, no public counts touched)"
          exit "$fail"

  # Pre-deploy notification: runs after the gate regardless of result.
  # Green is short (headline + aggregate); red is detailed (per-step breakdown).
  notify-pre:
    needs: build-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Telegram â€” pre-deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          GATE: ${{ needs.build-test.result }}
          O_TYPECHECK: ${{ needs.build-test.outputs.typecheck }}
          O_BUILD: ${{ needs.build-test.outputs.build }}
          O_SMOKE: ${{ needs.build-test.outputs.smoke }}
          O_DBVERIFY: ${{ needs.build-test.outputs.dbverify }}
          PASSED: ${{ needs.build-test.outputs.passed }}
          RAN: ${{ needs.build-test.outputs.ran }}
          SKIPPED: ${{ needs.build-test.outputs.skipped }}
        run: |
          icon() { case "$1" in
            success) printf 'âś…';; failure) printf 'âťŚ';;
            cancelled) printf 'đźš«';; skipped) printf 'âŹ­';; *) printf 'âť“';; esac; }

          sha7="${GITHUB_SHA:0:7}"
          subject="$(git log -1 --pretty=%s)"

          # Aggregate one-liner + smoke-row count suffix, only when stats exist.
          agg=""; smoke_suffix=""
          if [[ -n "${RAN:-}" ]]; then
            agg="smoke Â· ${PASSED}/${RAN} checks passed"
            smoke_suffix=" (${PASSED}/${RAN}"
            if [[ "${SKIPPED:-0}" -gt 0 ]]; then
              agg="${agg} (${SKIPPED} skipped)"
              smoke_suffix="${smoke_suffix}, ${SKIPPED} skipped"
            fi
            smoke_suffix="${smoke_suffix})"
          fi

          export TG_SUBLINE="bumpt@${GITHUB_REF_NAME}:${sha7}"
          export TG_SUBJECT="$subject"
          export TG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          export TG_AGGREGATE="$agg"

          if [[ "$GATE" == "success" ]]; then
            export TG_HEADER="âś… Pre-deploy passed"
          else
            export TG_HEADER="âťŚ Pre-deploy failed"
            export TG_BREAKDOWN="$(printf '  %s typecheck\n  %s build\n  %s smoke%s\n  %s db-verify' \
              "$(icon "$O_TYPECHECK")" "$(icon "$O_BUILD")" "$(icon "$O_SMOKE")" "$smoke_suffix" "$(icon "$O_DBVERIFY")")"
          fi

          bash experiment/.ci/telegram-notify.sh

  # Post-deploy notification: runs after the deploy job (skipped when the gate
  # failed and deploy never ran). Notify-only today â€” no live-site test yet.
  notify-post:
    needs: deploy
    if: ${{ always() && needs.deploy.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify Telegram â€” post-deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          RESULT: ${{ needs.deploy.result }}
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          sha7="${GITHUB_SHA:0:7}"
          subject="$(git log -1 --pretty=%s)"
          tag="$(git tag --list 'deploy-*' --points-at HEAD | head -n1)"

          case "$RESULT" in
            success)   header="âś… Post-deploy success";;
            failure)   header="âťŚ Post-deploy failed";;
            cancelled) header="đźš« Post-deploy cancelled";;
            *)         header="âť“ Post-deploy ${RESULT}";;
          esac

          target="${PROD_URL:-https://bumpt-nine.vercel.app}"
          subline="bumpt@${tag:-$GITHUB_REF_NAME}:${sha7}"
          [[ -n "$target" ]] && subline="${subline} â†’ ${target}"

          export TG_HEADER="$header"
          export TG_SUBLINE="$subline"
          export TG_SUBJECT="$subject"
          export TG_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          bash experiment/.ci/telegram-notify.sh
