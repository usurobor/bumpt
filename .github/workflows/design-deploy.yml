name: Design build & deploy (design.bumpt.io)

# The "wake" build for the design site. Source of truth is screens/*/view.html
# (+ spec.md) on main. This action assembles the deployable site (root index +
# each screen at /<name>/), publishes it to the design branch (a pure build
# artifact, force-updated each run), and deploys it to design.bumpt.io.
# Self-triggers on any change under screens/ (or this file).
#
# Required secret: VERCEL_TOKEN   Optional: VERCEL_SCOPE (team slug)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - screens/**
      - .github/workflows/design-deploy.yml

permissions:
  contents: write          # publish the design branch

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SCOPE: ${{ secrets.VERCEL_SCOPE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build site from screens/
        run: |
          set -e
          rm -rf dist && mkdir -p dist
          screens=$(cd screens && ls -d */ | sed 's#/##')
          # each screen -> /<name>/index.html, with flow links rewritten to dir routes
          for s in $screens; do
            mkdir -p "dist/$s"
            sed 's#\.\./\([a-z][a-z]*\)/view.html#../\1/#g' "screens/$s/view.html" > "dist/$s/index.html"
          done
          # root index — the common board
          {
            echo '<!doctype html><html lang="en"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1">'
            echo '<title>bump — screens</title>'
            echo '<style>body{margin:0;min-height:100dvh;background:radial-gradient(900px 600px at 50% -10%,#131318,#09090a 56%) fixed,#09090a;color:#ECEAE3;font-family:"Space Mono",ui-monospace,monospace;display:flex;justify-content:center}.w{width:100%;max-width:560px;padding:64px 28px}h1{font-size:22px;letter-spacing:-.6px;margin:0 0 28px}a{display:block;color:#ECEAE3;text-decoration:none;border-top:1px solid rgba(236,234,227,.11);padding:18px 4px;transition:color .2s,padding .2s}a:last-child{border-bottom:1px solid rgba(236,234,227,.11)}a:hover{color:#7C77FF;padding-left:10px}</style>'
            echo '</head><body><div class="w"><h1>bump — screens</h1>'
            for s in $screens; do echo "<a href=\"./$s/\">$s</a>"; done
            echo '</div></body></html>'
          } > dist/index.html
          echo "built:"; find dist -type f | sort

      - name: Deploy to Vercel (design.bumpt.io)
        working-directory: dist
        run: |
          npm i -g vercel@latest
          scope_args=(); [ -n "$SCOPE" ] && scope_args=(--scope "$SCOPE")
          vercel link --yes --project bump-design --token "$VERCEL_TOKEN" "${scope_args[@]}"
          url="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" "${scope_args[@]}")"
          echo "Deployed: $url"
          rm -rf .vercel

      - name: Publish to design branch (build artifact)
        run: |
          cd dist
          git init -q -b design
          git config user.email "noreply@anthropic.com"
          git config user.name "bump-design build"
          git add -A
          git commit -q -m "build: design site from ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" design

      - name: Wait for the new build to be live
        run: |
          for i in $(seq 1 10); do
            code=$(curl -sS -m 15 -o /dev/null -w '%{http_code}' https://design.bumpt.io/ || echo 000)
            echo "wait $i: https://design.bumpt.io/ -> HTTP $code"
            [ "$code" = "200" ] && break
            sleep 8
          done
          [ "$code" = "200" ] || { echo "::error::design.bumpt.io not serving (HTTP $code)"; exit 1; }

      - name: Visual check — deployed screens match source
        run: |
          npm i --no-save playwright pixelmatch pngjs
          npx playwright install --with-deps chromium
          cat > vcheck.mjs <<'EOF'
          import { chromium } from 'playwright';
          import fs from 'node:fs'; import path from 'node:path';
          import pngjs from 'pngjs'; const { PNG } = pngjs;
          import pixelmatch from 'pixelmatch';
          const BASE = 'https://design.bumpt.io';
          const screens = fs.readdirSync('screens').filter(d => fs.existsSync(`screens/${d}/view.html`));
          fs.mkdirSync('diff', { recursive: true });
          const browser = await chromium.launch();
          const rows = []; const failed = [];
          const shoot = async (ctx, url) => {
            const p = await ctx.newPage();
            await p.goto(url, { waitUntil: 'networkidle' });
            try { await p.evaluate(() => document.fonts.ready); } catch {}
            await p.waitForTimeout(500);
            const buf = await p.screenshot({ fullPage: true });
            return { p, buf };
          };
          const requiredComponents = (s) => {
            try {
              const m = fs.readFileSync(`screens/${s}/spec.md`, 'utf8').match(/required-components:\s*([^\n>]*)/);
              return m ? m[1].split(',').map(x => x.trim()).filter(Boolean) : [];
            } catch { return []; }
          };
          for (const s of screens) {
            const reasons = []; let pctR = 0;
            const ctx = await browser.newContext({ viewport:{width:390,height:844}, deviceScaleFactor:2, reducedMotion:'reduce' });
            const a = await shoot(ctx, 'file://' + path.resolve(`screens/${s}/view.html`));
            const src = PNG.sync.read(a.buf); await a.p.close();
            const b = await shoot(ctx, `${BASE}/${s}/`);
            const dep = PNG.sync.read(b.buf);
            // component presence: every required component must render (non-zero box)
            const missing = [];
            for (const c of requiredComponents(s)) {
              const box = await b.p.locator(`[data-component="${c}"]`).first().boundingBox().catch(() => null);
              if (!box || !box.width || !box.height) missing.push(c);
            }
            await b.p.close(); await ctx.close();
            // pixel: deployed vs mock
            if (src.width !== dep.width || src.height !== dep.height) {
              reasons.push(`size ${src.width}x${src.height} != ${dep.width}x${dep.height}`);
            } else {
              const { width, height } = src; const diff = new PNG({ width, height });
              const n = pixelmatch(src.data, dep.data, diff.data, width, height, { threshold: 0.1 });
              pctR = Math.round(100 * n / (width * height));
              if (pctR > 1) { reasons.push(`${pctR}% diff`); fs.writeFileSync(`diff/${s}.png`, PNG.sync.write(diff)); }
            }
            if (missing.length) reasons.push(`missing component(s): ${missing.join(', ')}`);
            if (reasons.length) { failed.push(s); rows.push(`${s}: FAIL — ${reasons.join(' · ')}`); }
            else rows.push(`${s}: ${pctR}% — match, components ok`);
          }
          await browser.close();
          const failtext = failed.map(s => rows.find(r => r.startsWith(s + ':'))).join('\n');
          fs.writeFileSync('diff/result.json', JSON.stringify({ total: screens.length, failed, rows, failtext }));
          console.log('\n' + rows.join('\n'));
          if (failed.length) { console.error(`\n${failed.length} screen(s) failed: ${failed.join(', ')}`); process.exit(1); }
          console.log('\nall screens match + required components present ✓');
          EOF
          node vcheck.mjs

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: diff/

      - name: Notify Telegram (design match)
        if: always()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          TG_TOPIC: ${{ secrets.TELEGRAM_TOPIC_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [ -n "$TG_TOKEN" ] && [ -n "$TG_CHAT" ] || { echo "telegram not configured; skip"; exit 0; }
          msg=(); [ -n "$TG_TOPIC" ] && msg=(-d message_thread_id="$TG_TOPIC")
          send(){ curl -sS "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d chat_id="$TG_CHAT" "${msg[@]}" -d parse_mode=HTML -d disable_web_page_preview=true \
            --data-urlencode text="$1" >/dev/null || true; }
          if [ -f diff/result.json ]; then
            total=$(jq -r '.total' diff/result.json)
            nfail=$(jq -r '.failed | length' diff/result.json)
            if [ "$nfail" = "0" ]; then
              send "✅ <b>design.bumpt.io</b> deployed — all ${total} screens match their mocks."
            else
              detail=$(jq -r '.failtext // (.failed | join(", "))' diff/result.json)
              send "❌ <b>design.bumpt.io</b> — $((total - nfail))/${total} ok; ${nfail} failed:
${detail}

Diffs attached where visual."
              pmsg=(); [ -n "$TG_TOPIC" ] && pmsg=(-F message_thread_id="$TG_TOPIC")
              for f in $(jq -r '.failed[]' diff/result.json); do
                [ -f "diff/$f.png" ] && curl -sS "https://api.telegram.org/bot$TG_TOKEN/sendPhoto" \
                  -F chat_id="$TG_CHAT" "${pmsg[@]}" -F caption="design.bumpt.io · ${f} diff (deployed vs mock)" \
                  -F photo=@"diff/$f.png" >/dev/null || true
              done
            fi
          else
            send "⚠️ <b>design.bumpt.io</b> build failed before the visual check (status: ${JOB_STATUS})."
          fi

      - name: Summary
        run: |
          { echo "### design.bumpt.io"; echo ""; echo "- built ${{ github.sha }} → design branch → deployed"; } >> "$GITHUB_STEP_SUMMARY"
