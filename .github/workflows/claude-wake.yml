# Wake workflow for Sigma-at-bumpt (bump-sigma).
#
# Trigger: opening an issue whose title contains "claude-wake".
# Authority: CLAUDE_CODE_OAUTH_TOKEN (operator's Claude Pro/Max subscription
# token, generated via `claude setup-token`, stored as a repo secret —
# same value as cnos/cn-sigma; one secret per repo).
#
# Substrate: anthropics/claude-code-action@v1 — auth path verified
# end-to-end at cnos (cnos#435..#438).
#
# Composition: "Activate and attach as https://github.com/usurobor/bumpt"
# — invokes the activate + attach skills in cnos.core/skills/agent/.
# The activate skill loads identity via bumpt's own spec/ pointers
# (PERSONA -> Sigma at cn-sigma; PROJECT -> bumpt binding) + README
# router on main. The attach skill detects foreign-activation mode
# (bumpt is registered in cn-sigma:state/activations.md) and runs the
# foreign-activation follow-up sync — the .cn-sigma/logs/ channel loop.
#
# Cron rationale (inherited from cnos/cn-sigma convergence; sigma log
# 20260602 RCA + directive): GH Actions drops cron slots wholesale under
# cluster load, so use four independently-scheduled staggered hourly
# entries, not one multi-minute line. bumpt owns :05/:20/:35/:50 — slots
# no other body shares:
#   cnos     :08/:23/:38/:53
#   cn-sigma :00/:15/:30/:45 and :12/:27/:42/:57
#   bumpt    :05/:20/:35/:50   <- race-free at the wake-concurrency level
# Combined channel cadence with three bodies: ~12 wakes/hour (~5 min).

name: claude-wake

on:
  issues:
    types: [opened]
  schedule:
    - cron: '5 * * * *'
    - cron: '20 * * * *'
    - cron: '35 * * * *'
    - cron: '50 * * * *'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

# Serialize wakes — never run two in parallel. Concurrent wakes would
# race on the channel surface (.cn-sigma/logs/) and produce duplicate
# entries or push conflicts. cancel-in-progress: false queues the new
# trigger behind any in-flight wake.
concurrency:
  group: claude-wake
  cancel-in-progress: false

jobs:
  wake:
    if: ${{ github.event_name == 'schedule' || contains(github.event.issue.title, 'claude-wake') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Activate and attach as https://github.com/usurobor/bumpt.
