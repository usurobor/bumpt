name: Vercel domain (one-off)

# Diagnose why bumpt.io won't resolve. Evidence so far: registry delegates
# bumpt.io -> ns1/ns2.vercel-dns.com, but those NS answer REFUSED and Vercel
# reports zone:false / "not a DNS zone". Per Vercel docs that means the zone
# was never provisioned on Vercel's side -- typically a pending TXT (_vercel)
# verification because the project lives on a team. This run reads exactly what
# Vercel is asking for (verification records + verified state) so we stop guessing.
# workflow_dispatch + self-trigger on this file (sandbox can't dispatch via API).

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - .github/workflows/vercel-domain.yml

permissions:
  contents: read

jobs:
  domain:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Inspect verification + zone state (Vercel REST API)
        run: |
          [ -n "$VERCEL_TOKEN" ] || { echo "::error::VERCEL_TOKEN not set"; exit 1; }
          auth=(-H "Authorization: Bearer $VERCEL_TOKEN")
          TID=$(curl -sS "${auth[@]}" https://api.vercel.com/v2/teams | jq -r '.teams[]? | select(.slug=="usurobor-1186s-projects") | .id')
          q=""; [ -n "$TID" ] && [ "$TID" != "null" ] && q="?teamId=$TID"
          echo "teamId: ${TID:-<none>}"
          api() { curl -sS "${auth[@]}" "$@"; }

          echo "== account/team domain object (zone? verified? intent?) =="
          api "https://api.vercel.com/v5/domains/bumpt.io$q" | jq '.domain | {name, verified, zone:.zone?, serviceType, nameservers, intendedNameservers, creator:.creator?.username}' 2>/dev/null \
            || api "https://api.vercel.com/v5/domains/bumpt.io$q"

          echo "== project domain object (verification records Vercel wants) =="
          api "https://api.vercel.com/v9/projects/bumpt/domains/bumpt.io$q" | jq '{name, verified, verification}' 2>/dev/null \
            || api "https://api.vercel.com/v9/projects/bumpt/domains/bumpt.io$q"

          echo "== config endpoint (misconfigured? which records expected) =="
          api "https://api.vercel.com/v6/domains/bumpt.io/config$q" | jq '.' 2>/dev/null \
            || api "https://api.vercel.com/v6/domains/bumpt.io/config$q"

          echo "== registry delegation (where the world is sent) =="
          dig NS bumpt.io @a0.nic.io +noall +authority +additional || true
          echo "== does Vercel NS answer SOA yet? (REFUSED = no zone) =="
          dig SOA bumpt.io @ns1.vercel-dns.com +noall +comments +answer || true
          echo "== resolver view =="
          dig bumpt.io @8.8.8.8 +noall +comments +answer || true
