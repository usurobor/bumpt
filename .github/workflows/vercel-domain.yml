name: Vercel domain (one-off)

# Verify bumpt.io now resolves via Squarespace-hosted DNS:
#   apex A -> 216.198.79.1, www CNAME -> cname.vercel-dns.com
# Checks registry delegation (should be back to Squarespace NS), the A/CNAME
# answers, Vercel's config/misconfigured flag, and HTTPS reachability.
# workflow_dispatch + self-trigger on this file (sandbox can't dispatch via API).

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - .github/workflows/vercel-domain.yml

permissions:
  contents: read

jobs:
  domain:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Verify resolution + Vercel config
        run: |
          echo "== registry delegation (should now be Squarespace NS, not vercel-dns) =="
          dig NS bumpt.io @a0.nic.io +noall +authority +additional || true
          echo "== apex A (want 216.198.79.1) via Google =="
          dig A bumpt.io @8.8.8.8 +noall +comments +answer || true
          echo "== www CNAME (want cname.vercel-dns.com) via Google =="
          dig CNAME www.bumpt.io @8.8.8.8 +noall +comments +answer || true
          echo "== A via Cloudflare 1.1.1.1 (cross-check) =="
          dig A bumpt.io @1.1.1.1 +short || true
          if [ -n "$VERCEL_TOKEN" ]; then
            auth=(-H "Authorization: Bearer $VERCEL_TOKEN")
            TID=$(curl -sS "${auth[@]}" https://api.vercel.com/v2/teams | jq -r '.teams[]? | select(.slug=="usurobor-1186s-projects") | .id')
            q=""; [ -n "$TID" ] && [ "$TID" != "null" ] && q="?teamId=$TID"
            echo "== Vercel config (misconfigured should flip to false once A resolves) =="
            curl -sS "${auth[@]}" "https://api.vercel.com/v6/domains/bumpt.io/config$q" | jq '{misconfigured, aValues, cnames, nameservers}' || true
          fi
          echo "== HTTPS apex =="
          curl -sS -m 20 -o /dev/null -w 'https://bumpt.io -> HTTP %{http_code}\n' https://bumpt.io || echo "apex not reachable yet"
          echo "== HTTPS www =="
          curl -sS -m 20 -o /dev/null -w 'https://www.bumpt.io -> HTTP %{http_code}\n' https://www.bumpt.io || echo "www not reachable yet"
