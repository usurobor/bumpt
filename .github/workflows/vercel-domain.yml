name: Vercel domain (one-off)

# Attaches bumpt.io (+ www) to the Vercel project and reports verification/SSL.
# Nameservers already point to Vercel, so attaching is all that's left.
# workflow_dispatch + self-trigger on this file (sandbox can't dispatch via API).
# fix: add records on Vercel-hosted zone (apex A + www CNAME)

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - .github/workflows/vercel-domain.yml

permissions:
  contents: read

jobs:
  domain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: experiment
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SCOPE: ${{ secrets.VERCEL_SCOPE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Attach domains (Vercel REST API)
        run: |
          [ -n "$VERCEL_TOKEN" ] || { echo "::error::VERCEL_TOKEN not set"; exit 1; }
          auth=(-H "Authorization: Bearer $VERCEL_TOKEN")
          # Resolve the team that owns the project (token is team-bound).
          TID=$(curl -sS "${auth[@]}" https://api.vercel.com/v2/teams | jq -r '.teams[]? | select(.slug=="usurobor-1186s-projects") | .id')
          q=""; [ -n "$TID" ] && [ "$TID" != "null" ] && q="?teamId=$TID"
          echo "teamId: ${TID:-<none>}"
          api() { curl -sS -w '\n[HTTP %{http_code}]\n' "${auth[@]}" "$@"; }
          for d in bumpt.io www.bumpt.io; do
            echo "== add $d =="
            api -X POST "https://api.vercel.com/v10/projects/bumpt/domains$q" \
              -H "Content-Type: application/json" -d "{\"name\":\"$d\"}"
          done
          echo "== ensure Vercel-DNS zone (team-level domain, so the NS actually serve it) =="
          api -X POST "https://api.vercel.com/v5/domains$q" -H "Content-Type: application/json" -d '{"name":"bumpt.io"}'
          echo "== add DNS records on Vercel's zone (apex A + www CNAME) =="
          api -X POST "https://api.vercel.com/v2/domains/bumpt.io/records$q" -H "Content-Type: application/json" -d '{"type":"A","name":"","value":"76.76.21.21","ttl":60}'
          api -X POST "https://api.vercel.com/v2/domains/bumpt.io/records$q" -H "Content-Type: application/json" -d '{"type":"CNAME","name":"www","value":"cname.vercel-dns.com","ttl":60}'
          echo "== records now =="
          api "https://api.vercel.com/v4/domains/bumpt.io/records$q"
          echo "== config (bumpt.io) =="
          api "https://api.vercel.com/v6/domains/bumpt.io/config$q"
          echo "== project domain (bumpt.io) =="
          api "https://api.vercel.com/v9/projects/bumpt/domains/bumpt.io$q"
          echo "== registry delegation (NS referral) =="
          dig NS bumpt.io @a0.nic.io +noall +authority +additional || true
          echo "== registry DNSSEC (DS) — leftover DS would block resolution =="
          dig DS bumpt.io @a0.nic.io +noall +authority +answer || true
          echo "== resolve via Google (status: NXDOMAIN vs SERVFAIL is the tell) =="
          dig bumpt.io @8.8.8.8 +noall +comments +answer || true
          echo "== A straight from Vercel's nameserver =="
          dig A bumpt.io @ns1.vercel-dns.com +noall +comments +answer || true
          echo "== HTTPS =="
          curl -sS -m 15 -o /dev/null -w 'https://bumpt.io -> HTTP %{http_code}\n' https://bumpt.io || echo "bumpt.io not reachable yet"
