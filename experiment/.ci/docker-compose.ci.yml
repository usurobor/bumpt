# CI-only stack: plain Postgres + the local Neon HTTP proxy, so the app's
# @neondatabase/serverless HTTP driver can run against a throwaway database.
# The app reaches the proxy at db.localtest.me:4444 (see lib/db.ts, NEON_LOCAL_PROXY).
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: main
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d main"]
      interval: 2s
      timeout: 3s
      retries: 15

  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    environment:
      PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/main
    ports:
      - "4444:4444"
    depends_on:
      postgres:
        condition: service_healthy
