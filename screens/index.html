<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>bump — screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#09090a;--bone:#ECEAE3;--bone-dim:#a2a2a8;--mute:#66666d;
    --hair:rgba(236,234,227,0.11);--coh:#7C77FF;
    --display:"Space Grotesk","Helvetica Neue",Arial,sans-serif;--mono:"Space Mono",ui-monospace,monospace;}
  *{box-sizing:border-box;} html,body{margin:0;min-height:100%;}
  body{background:radial-gradient(900px 600px at 50% -10%,#131318 0%,var(--ink) 56%) fixed,var(--ink);
    color:var(--bone);font-family:var(--display);-webkit-font-smoothing:antialiased;
    min-height:100dvh;display:flex;justify-content:center;}
  .wrap{width:100%;max-width:560px;padding:64px 28px 80px;}
  h1{font-family:var(--mono);font-weight:700;font-size:22px;letter-spacing:-0.6px;margin:0 0 4px;}
  .sub{font-family:var(--mono);font-size:12px;color:var(--mute);margin:0 0 36px;}
  ul{list-style:none;margin:0;padding:0;}
  li{border-top:1px solid var(--hair);} li:last-child{border-bottom:1px solid var(--hair);}
  a.row{display:flex;align-items:baseline;gap:14px;text-decoration:none;color:var(--bone);
    padding:18px 4px;transition:color .2s ease,padding .2s ease;}
  a.row:hover{color:var(--coh);padding-left:10px;}
  a.row .file{font-family:var(--mono);font-size:14px;min-width:88px;}
  a.row .desc{font-family:var(--display);font-size:14px;color:var(--bone-dim);}
  a.row .route{font-family:var(--mono);font-size:11px;color:var(--mute);margin-left:auto;white-space:nowrap;}
  .note{font-family:var(--mono);font-size:11px;color:var(--mute);line-height:1.8;margin-top:34px;}
  .note .coh{color:var(--coh);}
</style>
</head>
<body>
  <div class="wrap">
    <h1>bump — screens</h1>
    <p class="sub">design preview · full-bleed mockups</p>
    <ul>
      <li><a class="row" href="home/mock.html"><span class="file">home</span><span class="desc">locked door</span><span class="route">/</span></a></li>
      <li><a class="row" href="card/mock.html"><span class="file">card</span><span class="desc">scanned member card</span><span class="route">/m/a</span></a></li>
      <li><a class="row" href="about/mock.html"><span class="file">about</span><span class="desc">no signup / ask</span><span class="route">/about</span></a></li>
      <li><a class="row" href="thanks/mock.html"><span class="file">thanks</span><span class="desc">live knock count</span><span class="route">/thanks</span></a></li>
    </ul>
    <p class="note">Flow: <span class="coh">card → about → thanks</span>. Each folder has the mock and its spec.</p>
  </div>
</body>
</html>
