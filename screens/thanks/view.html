<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>bump · noted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* bump — app look & feel, extracted from design/reference/01_bumplookandfeel.html
   Each screen file is a standalone, full-viewport render of one app screen. */
:root{
  --ink:#09090a;
  --surface:#0c0c0e;
  --surface-2:#141418;
  --bone:#ECEAE3;
  --bone-dim:#a2a2a8;
  --mute:#66666d;
  --faint:#36363c;
  --hair:rgba(236,234,227,0.11);
  --hair-2:rgba(236,234,227,0.05);
  --coh:#7C77FF;                 /* coherence accent — the act of cohering */
  --coh-soft:rgba(124,119,255,0.14);
  --display:"Space Grotesk","Helvetica Neue",Arial,sans-serif;
  --mono:"Space Mono",ui-monospace,"SF Mono",Menlo,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:radial-gradient(120% 70% at 50% -8%,#131318 0%,var(--surface) 56%) fixed,var(--surface);
  color:var(--bone);font-family:var(--display);-webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;min-height:100dvh;
  display:flex;justify-content:center;
}

/* the screen = a full-height mobile column (no device bezel) */
.screen{position:relative;width:100%;max-width:430px;min-height:100dvh;
  display:flex;flex-direction:column;
  padding:max(54px,env(safe-area-inset-top)) 30px max(30px,env(safe-area-inset-bottom));}

.view{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;}

.top{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;}
.top .wm{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-weight:700;font-size:14px;letter-spacing:-0.4px;color:var(--bone);}
.top .wm .mark{width:18px;height:18px;}
.top .st{font-family:var(--mono);font-size:10px;color:var(--mute);letter-spacing:0.6px;text-transform:uppercase;}

.body{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;}
.grow{flex:1 1 auto;}

/* ---------------- the mark (reusable SVG) ---------------- */
.mark{display:block;width:24px;height:24px;}
.mark svg{display:block;width:100%;height:100%;overflow:visible;}
.mark .ring{fill:none;stroke:var(--bone);stroke-opacity:.20;stroke-width:2;}
.mark .arc{fill:none;stroke:var(--coh);stroke-width:2;stroke-linecap:round;
  stroke-dasharray:214;stroke-dashoffset:214;opacity:0;}
.mark .station{fill:var(--bone);fill-opacity:.22;}
.mark .pulse{fill:none;stroke:var(--coh);stroke-width:1.5;opacity:0;transform-origin:50px 50px;}
.mark.whole .ring{animation:breathe 5.5s ease-in-out infinite;}
@keyframes breathe{0%,100%{stroke-opacity:.16;}50%{stroke-opacity:.30;}}
.mark.cohering .arc{opacity:1;transition:stroke-dashoffset .72s cubic-bezier(.45,0,.2,1);stroke-dashoffset:0;}
.mark.cohering .ring{stroke-opacity:.30;transition:stroke-opacity .4s ease;}
.mark.cohering .station{animation:stationGlow .9s ease;}
.mark.settle .arc{opacity:0;transition:opacity .6s ease .05s;}
.mark.settle .ring{stroke:var(--bone);stroke-opacity:.20;transition:stroke-opacity .6s ease;}
.mark.pulsing .pulse{animation:pulseOut 1.05s cubic-bezier(.2,.6,.2,1);}
@keyframes stationGlow{0%{fill-opacity:.22;}35%{fill-opacity:1;}100%{fill-opacity:.22;}}
@keyframes pulseOut{0%{opacity:.55;transform:scale(.62);}100%{opacity:0;transform:scale(1.18);}}
@media (prefers-reduced-motion:reduce){
  .mark.whole .ring{animation:none;stroke-opacity:.24;}
  .mark.cohering .arc{transition:none;opacity:1;stroke-dashoffset:0;}
  .mark.cohering .station,.mark.pulsing .pulse{animation:none;}
}

/* ---------------- typography ---------------- */
.kick{font-family:var(--mono);font-size:10px;letter-spacing:1.7px;text-transform:uppercase;color:var(--coh);margin:0 0 14px;}
.dxl{font-family:var(--display);font-weight:500;font-size:37px;line-height:1.03;letter-spacing:-1.6px;color:var(--bone);margin:0;}
.dl{font-family:var(--display);font-weight:500;font-size:30px;line-height:1.07;letter-spacing:-1.1px;color:var(--bone);margin:0;}
.lede{font-family:var(--display);font-weight:400;font-size:15px;line-height:1.5;color:var(--bone-dim);margin:18px 0 0;letter-spacing:-0.2px;}
.note{font-family:var(--mono);font-size:11.5px;line-height:1.75;color:var(--mute);margin:0;letter-spacing:0.15px;}
.note b{color:var(--bone-dim);font-weight:400;}
.foot{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.4px;display:flex;gap:9px;flex-wrap:wrap;flex:0 0 auto;}
.foot span{color:var(--mute);}
.foot a{color:var(--mute);text-decoration:none;border-bottom:1px solid var(--hair-2);padding-bottom:1px;}

/* coherence divider — an arc of the ring */
.div{display:flex;align-items:center;gap:0;margin:20px 0;flex:0 0 auto;}
.div .ln{height:1px;background:var(--hair);flex:1 1 auto;}
.div .node{width:5px;height:5px;border-radius:50%;background:var(--bone);opacity:.28;margin:0 13px;}

/* action */
.act{appearance:none;border:0;cursor:pointer;width:100%;font-family:var(--mono);font-weight:700;font-size:14px;
  letter-spacing:0.3px;color:#0a0a0b;background:var(--bone);padding:17px 18px;border-radius:14px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;gap:12px;text-decoration:none;
  transition:transform .18s ease,background .28s ease,color .28s ease;}
.act .mark{width:17px;height:17px;}
.act:hover{background:var(--coh);color:#fff;}
.act:active{transform:scale(.985);}
.act:focus-visible{outline:2px solid var(--coh);outline-offset:3px;}
.act.ghost{background:transparent;color:var(--bone);border:1px solid var(--hair);}
.act.ghost:hover{background:var(--surface-2);color:var(--bone);}
.micro{font-family:var(--mono);font-size:10px;color:var(--mute);text-align:center;margin-top:12px;letter-spacing:0.4px;flex:0 0 auto;}

/* card identity */
.id{display:flex;flex-direction:column;align-items:flex-start;}
.disc{position:relative;width:80px;height:80px;border-radius:50%;margin-bottom:20px;
  background:radial-gradient(60% 60% at 36% 30%,#23233a 0%,#121218 72%),var(--surface-2);
  box-shadow:0 0 0 1px var(--hair),0 0 34px -10px var(--coh-soft);
  display:flex;align-items:center;justify-content:center;overflow:hidden;}
.disc::after{content:"";position:absolute;inset:0;mix-blend-mode:overlay;opacity:.5;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='80' height='80' filter='url(%23n)' opacity='0.5'/></svg>");}
.disc b{position:relative;font-family:var(--mono);font-weight:700;font-size:29px;color:var(--bone);letter-spacing:-1px;}
.name{font-family:var(--display);font-weight:600;font-size:30px;letter-spacing:-1px;margin:0;color:var(--bone);}
.node-id{font-family:var(--mono);font-size:11.5px;color:var(--mute);margin:7px 0 0;letter-spacing:0.5px;}
.signal{font-family:var(--display);font-weight:400;font-size:16px;color:var(--bone-dim);margin:20px 0 0;letter-spacing:-0.2px;}
.signal:before{content:"\201C";color:var(--faint);}
.signal:after{content:"\201D";color:var(--faint);}

/* thanks counter */
.count{font-family:var(--mono);font-weight:700;font-size:58px;line-height:1;letter-spacing:-2px;color:var(--bone);
  margin:8px 0 10px;font-variant-numeric:tabular-nums;}
.countlabel{font-family:var(--mono);font-size:11px;color:var(--mute);letter-spacing:0.3px;margin:0;}

</style>
<script>
/* bump — shared screen behaviour: inject the mark, run the cohere animation,
   navigate between screens after a bump, and tick the counter. */
(function () {
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var MARK =
    '<svg viewBox="0 0 100 100" aria-hidden="true">' +
      '<circle class="ring" cx="50" cy="50" r="34"></circle>' +
      '<circle class="pulse" cx="50" cy="50" r="34"></circle>' +
      '<path class="arc" d="M50 16 A34 34 0 1 1 49.99 16"></path>' +
      '<circle class="station" cx="50" cy="16" r="2.4"></circle>' +
      '<circle class="station" cx="79.4" cy="67" r="2.4"></circle>' +
      '<circle class="station" cx="20.6" cy="67" r="2.4"></circle>' +
    '</svg>';

  document.querySelectorAll('[data-mark]').forEach(function (h) { h.innerHTML = MARK; });

  function cohere(mark, cb) {
    if (!mark) { if (cb) cb(); return; }
    if (reduce) { if (cb) setTimeout(cb, 120); return; }
    mark.classList.remove('settle');
    mark.classList.add('cohering', 'pulsing');
    setTimeout(function () { mark.classList.add('settle'); }, 720);
    setTimeout(function () { mark.classList.remove('cohering', 'pulsing', 'settle'); }, 1400);
    if (cb) setTimeout(cb, 560);
  }

  // tap the mark / wordmark to watch it cohere
  document.querySelectorAll('[data-cohere-self]').forEach(function (h) {
    h.addEventListener('click', function () { cohere(h.querySelector('.mark')); });
  });

  // a bump that moves to another screen: cohere, then navigate
  document.querySelectorAll('[data-nav]').forEach(function (el) {
    el.addEventListener('click', function (e) {
      e.preventDefault();
      var href = el.getAttribute('data-nav');
      cohere(el.querySelector('.mark'), function () { window.location.href = href; });
    });
  });

  // cohere once on load (e.g. the thanks mark, when the knock lands)
  document.querySelectorAll('[data-cohere-load]').forEach(function (h) {
    setTimeout(function () { cohere(h.querySelector('.mark') || h); }, 280);
  });

  // count up to the target so the live count feels alive
  var c = document.querySelector('[data-counter]');
  if (c) {
    var target = parseInt(c.getAttribute('data-counter') || c.textContent.replace(/[^0-9]/g, ''), 10);
    if (!isNaN(target)) {
      if (reduce) { c.textContent = target.toLocaleString('en-US'); }
      else {
        var from = Math.max(0, target - 8), cur = from, t0 = null;
        c.textContent = from.toLocaleString('en-US');
        requestAnimationFrame(function step(ts) {
          if (t0 === null) t0 = ts;
          var p = Math.min(1, (ts - t0) / 900);
          cur = Math.round(from + (target - from) * (1 - Math.pow(1 - p, 3)));
          c.textContent = cur.toLocaleString('en-US');
          if (p < 1) requestAnimationFrame(step);
        });
      }
    }
  }
})();

</script>
</head>
<body>
  <main class="screen">
    <div class="view">
      <div class="top">
        <span class="wm" data-cohere-self><span class="mark" data-mark></span>bump</span>
        <span class="st">noted</span>
      </div>
      <div class="body" style="align-items:flex-start;">
        <div class="grow" style="flex:0 0 38px;"></div>
        <div class="mark whole" data-mark data-cohere-load style="width:80px;height:80px;margin-bottom:26px;"></div>
        <p class="kick">you knocked</p>
        <div class="count" data-counter="1248">1,248</div>
        <p class="countlabel">people have asked in</p>
        <p class="lede" style="margin-top:22px;">Come back in a month. You still only get in through an in-person bump.</p>
        <div class="div"><span class="ln"></span><span class="node"></span><span class="ln"></span></div>
        <p class="note"><b>Anonymous throughout.</b> No name, email, phone, or tracking. Aggregate counts only — and repeat taps don't double-count.</p>
        <div class="grow"></div>
        <div class="foot"><span>private by default</span>·<span>no personal data</span></div>
      </div>
    </div>
  </main>
</body>
</html>
